<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
    <title>테니스 대회 매니저</title>
    
    <!-- 캐시 무력화를 위해 주소 뒤에 v=2를 붙였습니다 -->
    <!-- 1. 데스크탑 브라우저 탭 아이콘 (Favicon) -->
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3132/3132717.png?v=2">
    
    <!-- 2. 아이폰/아이패드 홈 화면 아이콘 -->
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3132/3132717.png?v=2">
    <link rel="apple-touch-icon" sizes="180x180" href="https://cdn-icons-png.flaticon.com/512/3132/3132717.png?v=2">

    <!-- 3. 모바일 앱 이름 및 모드 설정 -->
    <meta name="apple-mobile-web-app-title" content="테니스대회">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 이하 스타일 및 스크립트... -->
    
<style>
    body { font-family: 'Pretendard', sans-serif; padding: 20px; line-height: 1.6; background: #f0f2f5; color: #1a1a1a; }
    .container { max-width: 950px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    h2 { border-bottom: 3px solid #3498db; padding-bottom: 12px; color: #2c3e50; display: flex; justify-content: space-between; align-items: center; }
    .config-section { margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; border: 1px solid #dee2e6; }
    
    table { width: 100%; border-collapse: collapse; margin-bottom: 30px; background: #fff; }
    th { background: #2c3e50; color: #ffffff !important; border: 1px solid #dee2e6; padding: 10px; font-size: 14px; }
    td { border: 1px solid #dee2e6; padding: 10px; color: #333 !important; text-align: center; }
    
    .rank-high { background-color: #e3f2fd !important; font-weight: bold; }
    .btn { padding: 6px 12px; background: #3498db; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-right: 3px; font-size: 13px; }
    .btn-gen { background: #2980b9; width: 100%; padding: 15px; font-size: 16px; margin-top: 10px; }
    .btn-del { background: #e74c3c; }
    .btn-warn { background: #f39c12; color: white; } /* 경고용 오렌지색 */
    .btn-edit { background: #f39c12; }
    
    .match-card { border-left: 5px solid #3498db; background: #f8f9fa; padding: 12px; margin-bottom: 10px; border-radius: 5px; display: flex; align-items: center; justify-content: space-between; color: #2c3e50; }
    .completed { background: #e9ecef !important; border-left-color: #95a5a6 !important; opacity: 0.9; }
    
    .history-section { margin-top: 40px; border-top: 2px dashed #ccc; padding-top: 20px; }
    .history-item { font-size: 13px; padding: 12px; border-bottom: 1px solid #eee; background: #fff; margin-bottom: 5px; border-radius: 4px; }
    .history-date { font-weight: bold; color: #34495e; display: block; margin-bottom: 8px; border-left: 3px solid #2ecc71; padding-left: 10px; }
</style>
</head>
<body>

<div class="container">
    <h2>
        🎾 테니스 대회 운영 시스템
        <div>
            <button class="btn" style="background:#27ae60" onclick="exportData()">📥 백업</button>
            <label class="btn" style="background:#8e44ad; display:inline-block; cursor:pointer;">
                📤 복구 <input type="file" style="display:none" onchange="importData(event)">
            </label>
            <button class="btn" style="background:#546e7a" id="adminBtn" onclick="toggleAdmin()">🔒 관리자</button>
        </div>
    </h2>
    
    <div class="config-section">
        <div style="margin-bottom:10px;">
            <input type="text" id="pName" placeholder="이름">
            <select id="pLevel">
                <option value="" disabled selected>실력 선택</option>
                <option value="5">고급</option><option value="4">상급</option>
                <option value="3">중급</option><option value="2">초급</option>
                <option value="1">입문</option>
            </select>
            <button class="btn" onclick="addPlayer()">선수 추가</button>
            <button class="btn btn-del" onclick="resetAll()">전체 데이터 초기화</button>
        </div>
        <div>
            목표 경기 수: <input type="number" id="targetGames" value="4" style="width:50px;">
            <button class="btn btn-gen" onclick="generateMatches()">대진표 새 생성</button>
            <!-- 관리자 모드에서만 보이는 버튼 -->
            <button id="clearMatchesBtn" class="btn btn-warn" style="display:none; margin-top:10px;" onclick="clearCurrentMatches()">⚠️ 현재 경기 기록만 모두 삭제</button>
        </div>
    </div>

    <h3>📊 실시간 순위 <span id="adminStatus" style="display:none; color:#d35400; font-size:12px;">(관리자 권한 활성)</span></h3>
    <table id="rankTable">
        <thead>
            <tr>
                <th style="width:40px;">참가</th><th style="width:50px;">순위</th><th>이름</th>
                <th id="adminTh" style="display:none;">실력</th><th>경기수</th><th>승점</th><th>득실차</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h3>🎾 진행 중인 경기</h3>
    <div id="matchContainer"></div>

    <div class="history-section">
        <h3>📜 과거 대회 기록</h3>
        <div id="historyContainer"></div>
    </div>
</div>

<script>
let players = [];
let matches = [];
let history = [];
let isAdmin = false;
const STORAGE_KEY = 'tennis_v3_7_final';
const levelMap = {"5":"고급","4":"상급","3":"중급","2":"초급","1":"입문"};

window.onload = loadData;

function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ players, matches, history })); }

function loadData() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        const d = JSON.parse(saved);
        players = d.players || [];
        matches = d.matches || [];
        history = d.history || [];
        updateRankTable(); renderMatches(); renderHistory();
    }
}

// 관리자 전용: 현재 경기 리스트만 싹 지우기
function clearCurrentMatches() {
    if(confirm("주의! 현재 화면에 보이는 모든 대진표와 시합 결과가 삭제됩니다.\n(선수 명단과 과거 히스토리는 유지됩니다.)")) {
        matches = [];
        recalculateScores();
        alert("현재 경기 기록이 모두 삭제되었습니다.");
    }
}

function addPlayer() {
    const name = document.getElementById('pName').value.trim();
    const level = document.getElementById('pLevel').value;
    if(!name || !level) return alert("이름과 실력을 입력하세요.");
    players.push({ name, level: parseInt(level), score: 0, diff: 0, gamesPlayed: 0, active: true });
    document.getElementById('pName').value = '';
    saveData(); updateRankTable();
}

function generateMatches() {
    const completed = matches.filter(m => m.completed);
    if (completed.length > 0) {
        if(confirm("진행 중인 경기가 있습니다. 이 기록들을 과거 히스토리로 옮기고 새 대진을 짤까요?")) {
            history.unshift({ id: Date.now(), date: new Date().toLocaleString(), games: completed });
        } else { return; }
    }
    const activeOnes = players.filter(p => p.active);
    if(activeOnes.length < 4) return alert("최소 4명이 필요합니다.");
    
    matches = [];
    const target = parseInt(document.getElementById('targetGames').value);
    let counts = {}; activeOnes.forEach(p => counts[p.name] = 0);
    const total = Math.ceil((activeOnes.length * target) / 4);
    
    for(let i = 1; i <= total; i++) {
        let sorted = [...activeOnes].sort((a, b) => counts[a.name] - counts[b.name] || Math.random() - 0.5);
        let mP = sorted.slice(0, 4).sort((a, b) => b.level - a.level);
        matches.push({ id: i, t1: [mP[0].name, mP[3].name], t2: [mP[1].name, mP[2].name], s1: null, s2: null, completed: false });
        [mP[0], mP[3], mP[1], mP[2]].forEach(p => counts[p.name]++);
    }
    recalculateScores();
}

function renderMatches() {
    const c = document.getElementById('matchContainer');
    c.innerHTML = matches.length ? "" : "진행 중인 경기가 없습니다.";
    matches.forEach(m => {
        const div = document.createElement('div');
        div.className = `match-card ${m.completed ? 'completed' : ''}`;
        let content = `<div><strong>[${m.id}]</strong> ${m.t1[0]}&${m.t1[1]} `;
        if(m.completed) {
            content += `<b>${m.s1} : ${m.s2}</b> ${m.t2[0]}&${m.t2[1]}</div>`;
            if(isAdmin) {
                content += `<div><button class="btn btn-edit" onclick="editMatch(${m.id})">수정</button><button class="btn btn-del" onclick="deleteMatch(${m.id})">삭제</button></div>`;
            }
        } else {
            content += `<input type="number" id="m${m.id}_1" style="width:35px"> : <input type="number" id="m${m.id}_2" style="width:35px"> ${m.t2[0]}&${m.t2[1]}</div>`;
            content += `<div><button class="btn" onclick="saveMatch(${m.id})">저장</button></div>`;
        }
        div.innerHTML = content;
        c.appendChild(div);
    });
}

function saveMatch(id) {
    const m = matches.find(x => x.id === id);
    const s1 = parseInt(document.getElementById(`m${id}_1`).value);
    const s2 = parseInt(document.getElementById(`m${id}_2`).value);
    if(isNaN(s1) || isNaN(s2)) return alert("점수를 입력하세요.");
    m.s1 = s1; m.s2 = s2; m.completed = true;
    recalculateScores();
}

function recalculateScores() {
    players.forEach(p => { p.score = 0; p.diff = 0; p.gamesPlayed = 0; });
    matches.filter(m => m.completed).forEach(m => {
        const apply = (n, my, op) => {
            let p = players.find(x => x.name === n);
            if(p) { p.gamesPlayed++; p.diff += (my - op); if(my > op) p.score += 2; else if(my === op) p.score += 1; }
        };
        apply(m.t1[0], m.s1, m.s2); apply(m.t1[1], m.s1, m.s2);
        apply(m.t2[0], m.s2, m.s1); apply(m.t2[1], m.s2, m.s1);
    });
    saveData(); updateRankTable(); renderMatches(); renderHistory();
}

function toggleAdmin() {
    isAdmin = !isAdmin;
    if(isAdmin && prompt("비밀번호:") !== "1234") { isAdmin = false; return; }
    document.getElementById('adminTh').style.display = isAdmin ? "table-cell" : "none";
    document.getElementById('adminStatus').style.display = isAdmin ? "inline" : "none";
    document.getElementById('clearMatchesBtn').style.display = isAdmin ? "inline-block" : "none";
    updateRankTable(); renderMatches(); renderHistory();
}

function updateRankTable() {
    const tbody = document.querySelector('#rankTable tbody');
    tbody.innerHTML = "";
    let ranked = [...players].sort((a, b) => b.score - a.score || b.diff - a.diff || b.level - a.level);
    ranked.forEach((p, i) => {
        const tr = document.createElement('tr');
        if(p.score > 0 && i < 3) tr.className = "rank-high";
        tr.innerHTML = `<td><input type="checkbox" ${p.active ? 'checked' : ''} onchange="toggleActive('${p.name}')"></td><td>${i+1}</td><td style="text-align:left; padding-left:15px;">${p.name}</td><td style="display:${isAdmin?'table-cell':'none'}">${levelMap[p.level]}</td><td>${p.gamesPlayed}</td><td>${p.score}</td><td>${p.diff}</td>`;
        tbody.appendChild(tr);
    });
}

function renderHistory() {
    const c = document.getElementById('historyContainer');
    c.innerHTML = history.length ? "" : "과거 기록이 없습니다.";
    history.forEach(h => {
        const div = document.createElement('div');
        div.className = "history-item";
        let header = `<div style="display:flex; justify-content:space-between;"><span class="history-date">📅 ${h.date}</span>`;
        if(isAdmin) header += `<button class="btn btn-del" style="padding:2px 8px;" onclick="deleteHistory(${h.id})">삭제</button>`;
        header += `</div>`;
        let games = h.games.map(g => `<div>${g.t1[0]}&${g.t1[1]} <b>${g.s1}:${g.s2}</b> ${g.t2[0]}&${g.t2[1]}</div>`).join('');
        div.innerHTML = header + games;
        c.appendChild(div);
    });
}

// 공통 함수들 (동일)
function toggleActive(n) { const p = players.find(x => x.name === n); p.active = !p.active; saveData(); }
function editMatch(id) { const m = matches.find(x => x.id === id); const n1 = prompt("팀1 점수:", m.s1); const n2 = prompt("팀2 점수:", m.s2); if(n1 !== null && n2 !== null) { m.s1 = parseInt(n1); m.s2 = parseInt(n2); recalculateScores(); } }
function deleteMatch(id) { if(confirm("삭제?")) { matches = matches.filter(m => m.id !== id); recalculateScores(); } }
function deleteHistory(hid) { if(confirm("삭제?")) { history = history.filter(h => h.id !== hid); saveData(); renderHistory(); } }
function exportData() { const blob = new Blob([JSON.stringify({players, matches, history})], {type: "application/json"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `tennis_backup.json`; a.click(); }
function importData(e) { const reader = new FileReader(); reader.onload = (ev) => { const d = JSON.parse(ev.target.result); players = d.players; matches = d.matches; history = d.history || []; saveData(); updateRankTable(); renderMatches(); renderHistory(); }; reader.readAsText(e.target.files[0]); }
function resetAll() { if(confirm("선수 명단 포함 모든 데이터를 초기화하시겠습니까?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
